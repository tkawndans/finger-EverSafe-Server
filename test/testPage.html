<script>
const NODE = "";
/** Ever-Safe HTTP API 접두사 (서버와 동일) */
const API_PREFIX = "/api/v1/ever-safe";

const logEl = document.getElementById("log");
const resultEl = document.getElementById("result");

function base() { return NODE || (window.location.origin || ""); }

/**
 * 상대 API 경로 → 절대 URL. 예: everSafeApiUrl("/warm/retry") → …/api/v1/ever-safe/warm/retry
 * 테스트 페이지·POST /test/extract-ut 는 프리픽스 없음(별도 호출).
 * (이름을 apiUrl 로 두지 않음 — runPreset 등에서 const apiUrl = targetUrl 로 덮어쓰면 전역 fetch 가 전부 깨짐)
 */
function everSafeApiUrl(path) {
  const p = path.startsWith("/") ? path : "/" + path;
  return base() + API_PREFIX + p;
}

/** 서버 lib/payloadCustomBase64.encodeCustomBase64 와 동일 */
const WARM_ALPHABET_LEN = 65;
function encodeCustomBase64(plain, alphabet) {
  if (plain == null || alphabet == null || alphabet === "") {
    throw new Error("인코딩 입력이 올바르지 않습니다.");
  }
  const cleanAlphabet = String(alphabet).replace(/[\s\t\n\r]/g, "");
  if (cleanAlphabet.length !== WARM_ALPHABET_LEN) {
    throw new Error("알파벳 길이가 올바르지 않습니다.");
  }
  const table = cleanAlphabet.slice(0, 64);
  const pad = cleanAlphabet[64];
  const uriStr = encodeURIComponent(String(plain));
  const bytes = [];
  for (let i = 0; i < uriStr.length; i++) {
    const c = uriStr.charCodeAt(i);
    if (c > 255) {
      throw new Error("인코딩할 수 없는 문자가 포함되어 있습니다.");
    }
    bytes.push(c);
  }
  let out = "";
  for (let i = 0; i < bytes.length; i += 3) {
    const b1 = bytes[i];
    const b2 = i + 1 < bytes.length ? bytes[i + 1] : 0;
    const b3 = i + 2 < bytes.length ? bytes[i + 2] : 0;
    const n = (b1 << 16) | (b2 << 8) | b3;
    const k1 = (n >> 18) & 63;
    const k2 = (n >> 12) & 63;
    const k3 = (n >> 6) & 63;
    const k4 = n & 63;
    out += table[k1] + table[k2];
    if (i + 1 < bytes.length) {
      out += table[k3];
    } else {
      out += pad;
    }
    if (i + 2 < bytes.length) {
      out += table[k4];
    } else {
      out += pad;
    }
  }
  return out;
}

document.getElementById("baseUrl").textContent = base() + API_PREFIX;

async function syncBrowserModeFromServer() {
  try {
    const r = await fetch(everSafeApiUrl("/health"));
    const j = await r.json();
    const el = document.getElementById("browserHeadStatus");
    if (el && typeof j.headful === "boolean") {
      el.textContent = j.headful ? "서버: headful" : "서버: headless";
    }
  } catch (_) {
    const el = document.getElementById("browserHeadStatus");
    if (el) el.textContent = "";
  }
}

async function ensureBrowserModeForRun() {
  const wantHeadful = document.getElementById("radioHeadful").checked;
  log("선택 모드: " + (wantHeadful ? "headful" : "headless"), "step");
  const res = await nodePost("/browser/headful", { headful: wantHeadful });
  logResponse("[응답] POST /browser/headful", res, 4000);
  if (res.error) throw new Error(res.error);
  if (res.relaunched === false) {
    log("서버 모드가 이미 동일 — 브라우저 재시작 없음", "info");
  } else {
    log(res.message || "브라우저 재시작됨", "info");
  }
  await syncBrowserModeFromServer();
}

document.getElementById("btnApplyHeadMode").onclick = async () => {
  logEl.textContent = "";
  resultEl.textContent = "";
  try {
    await ensureBrowserModeForRun();
    const r = await fetch(everSafeApiUrl("/health"));
    const j = await r.json();
    resultEl.textContent = JSON.stringify(j, null, 2);
    log("[적용 완료] /health 의 headful=" + j.headful + " (true면 창이 떠야 함)", "info");
  } catch (e) {
    log(String(e), "err");
  }
};

function log(msg, level) {
  const ts = new Date().toLocaleTimeString();
  const line = "[" + ts + "][" + (level || "info") + "] " + msg + "\n";
  logEl.textContent += line;
  logEl.scrollTop = logEl.scrollHeight;
}

/** 응답 JSON/객체를 콘솔에 기록 (과도하게 긴 본문은 잘림) */
function logResponse(title, obj, maxChars) {
  maxChars = maxChars || 14000;
  let s;
  try {
    s = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
  } catch (e) {
    s = String(obj);
  }
  if (s.length > maxChars) {
    s = s.slice(0, maxChars) + "\n… (생략, 전체 " + s.length + "자)";
  }
  log(title + "\n" + s, "data");
}

/** Admin 토큰 — POST /browser/headful, /warm/retry 등에 사용 */
function adminHeaderMap() {
  const el = document.getElementById("pAdminToken");
  const token = el && (el.value || "").trim();
  if (!token) return {};
  return { "X-Browser-Admin-Token": token };
}

async function nodePost(path, body, opts) {
  const url = path.startsWith("/test") ? base() + path : everSafeApiUrl(path);
  const r = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      ...adminHeaderMap(),
      ...(opts && opts.headers ? opts.headers : {}),
    },
    body: JSON.stringify(body),
  });
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch (_) { data = { _raw: text }; }
  if (data && typeof data === "object" && !Array.isArray(data)) {
    data._httpStatus = r.status;
    data._httpOk = r.ok;
  } else {
    data = { _data: data, _httpStatus: r.status, _httpOk: r.ok };
  }
  if (!r.ok) log("HTTP " + r.status + " " + path + " — " + text.substring(0, 300), "err");
  return data;
}

/* ─── 버튼: Clear / Health / Sessions ─── */
document.getElementById("btnClear").onclick = () => { logEl.textContent = ""; resultEl.textContent = ""; };
document.getElementById("btnHealth").onclick = async () => {
  try {
    const r = await fetch(everSafeApiUrl("/health"));
    const j = await r.json();
    resultEl.textContent = JSON.stringify(j, null, 2);
    log("GET /health OK", "info");
    logWarmSummary(j);
    await syncBrowserModeFromServer();
  } catch (e) { log(String(e), "err"); }
};

function logWarmSummary(j) {
  if (!j || typeof j !== "object") return;
  if (j.warmEnabled === true) {
    log("[웜] warmReady=" + j.warmReady + ", warmSetupInFlight=" + j.warmSetupInFlight + (j.warmLastError ? ", lastError=" + j.warmLastError : ""), "info");
    if (j.warmPayloadEncodingReady === false) {
      log("[웜] 서버 BROWSER_ADMIN_TOKEN 길이가 " + WARM_ALPHABET_LEN + "자가 아니어서 evaluate/warm 페이로드 디코드가 불가합니다.", "err");
    }
  } else if (j.warmEnabled === false) {
    log("[웜] 비활성(WARM_START_URL 미설정 또는 warmConfigError)", "info");
  }
}

document.getElementById("btnWarmHealth").onclick = async () => {
  try {
    log("GET /health (웜 필드 확인)", "step");
    const r = await fetch(everSafeApiUrl("/health"));
    const j = await r.json();
    resultEl.textContent = JSON.stringify(j, null, 2);
    logWarmSummary(j);
    log("warmEnabled=" + JSON.stringify(j.warmEnabled) + " warmReady=" + JSON.stringify(j.warmReady), "data");
    await syncBrowserModeFromServer();
  } catch (e) { log(String(e), "err"); }
};

document.getElementById("btnWarmEvaluate").onclick = async () => {
  logEl.textContent = "";
  resultEl.textContent = "";
  log("[Warm] POST /evaluate/warm 클릭됨", "step");
  try {
    const targetUrlStr = document.getElementById("pTargetUrl").value.trim();
    const ct = document.getElementById("pContentType").value.trim();
    const payloadRaw = document.getElementById("pPayload").value.trim();
    const timeout = parseInt(document.getElementById("pTimeout").value, 10) || 60000;
    if (!targetUrlStr) {
      log("③ targetUrl이 비어 있습니다.", "err");
      alert("③ targetUrl(XHR 주소)을 채워 주세요.");
      return;
    }
    const asPlainString = document.getElementById("pWarmPayloadAsPlainString").checked;
    let requestPayload;
    if (asPlainString) {
      requestPayload = payloadRaw;
      log("[테스트] 인코딩 없이 payload 문자열 전송 → 디코드/파싱 오류를 기대할 수 있음", "step");
    } else {
      if (!payloadRaw) {
        log("③ payload가 비어 있습니다.", "err");
        alert("③ payload(JSON)를 채우거나, 오류 테스트만 할 경우「인코딩 없이 전송」을 켜세요.");
        return;
      }
      const alphabet = (document.getElementById("pAdminToken").value || "").trim();
      if (alphabet.length !== WARM_ALPHABET_LEN) {
        const msg =
          "evaluate/warm(인코딩 전송): Admin 토큰 필드에 서버 BROWSER_ADMIN_TOKEN과 동일한 " +
          WARM_ALPHABET_LEN +
          "자가 필요합니다. (현재 " +
          alphabet.length +
          "자)";
        log(msg + " — 오류 테스트만 하려면「인코딩 없이 전송」체크.", "err");
        alert(msg + "\n\n※ 오류 재현만 할 때는 아래 체크박스「인코딩 없이 전송」을 켜세요.");
        return;
      }
      let plainForEncode;
      try {
        plainForEncode = JSON.stringify(JSON.parse(payloadRaw));
      } catch (_) {
        plainForEncode = payloadRaw;
      }
      try {
        requestPayload = encodeCustomBase64(plainForEncode, alphabet);
      } catch (e) {
        log("payload 인코딩 실패: " + (e && e.message ? e.message : e), "err");
        return;
      }
      log("[웜] ③ payload를 커스텀 Base64 문자열로 인코딩하여 전송(운영과 동일)", "step");
    }
    let warmHealth = null;
    try {
      const hr = await fetch(everSafeApiUrl("/health"));
      warmHealth = await hr.json();
      resultEl.textContent = JSON.stringify(warmHealth, null, 2);
      logWarmSummary(warmHealth);
      if (warmHealth.warmEnabled === true && warmHealth.warmReady !== true) {
        log(
          "[웜] warmReady 가 아직 true가 아닙니다 → evaluate/warm 은 503일 수 있습니다. warmSetupInFlight·warmLastError 를 확인하세요.",
          "err"
        );
      }
      if (warmHealth.warmEnabled !== true) {
        log("warmEnabled 가 true가 아닙니다. WARM_START_URL·warmConfigError 를 확인하세요.", "err");
      }
      if (!asPlainString && warmHealth.warmPayloadEncodingReady === false) {
        const msg =
          "서버 쪽 BROWSER_ADMIN_TOKEN 길이가 " +
          WARM_ALPHABET_LEN +
          "자가 아닙니다. .env 를 맞추거나 클라이언트 인코딩과 서버가 같은 토큰인지 확인하세요.";
        log(msg, "err");
        alert(msg);
        return;
      }
    } catch (eh) {
      log("/health 사전 확인 실패: " + String(eh), "err");
    }
    const body = {
      targetUrl: targetUrlStr,
      contentType: ct || "application/json",
      payload: requestPayload,
      timeout,
    };
    if (document.getElementById("pXhrDelegate").checked) {
      body.xhrDelegateToClient = true;
      body.xhrCaptureTimeoutMs = timeout;
    }
    log("POST …/evaluate/warm — 아래 ③ 필드만 사용 (url·vmLoadBaseUrl 없음)", "step");
    const t0 = Date.now();
    const out = await nodePost("/evaluate/warm", body);
    logResponse("[응답] POST /evaluate/warm", out, 20000);
    resultEl.textContent = JSON.stringify(out, null, 2);
    log("Elapsed: " + (Date.now() - t0) + "ms", "data");
    if (out.error) log("실패: " + out.error, "err");
  } catch (e) {
    log(String(e), "err");
  }
};

    if (waitUntilUrlContains) body.waitUntilUrlContains = waitUntilUrlContains;

/* ─── 프리셋 실행 ─── */
async function runPreset() {
  const createUrl = document.getElementById("pCreateUrl").value.trim();
  const vmBaseUrl = document.getElementById("pVmUrl").value.trim();
  const xhrTargetUrl = document.getElementById("pTargetUrl").value.trim();
  const ct = document.getElementById("pContentType").value.trim();
  const payloadRaw = document.getElementById("pPayload").value.trim();
  const timeout = parseInt(document.getElementById("pTimeout").value) || 60000;

  let requestPayload;
  try { requestPayload = JSON.parse(payloadRaw); }
  catch (_) { requestPayload = payloadRaw; }

  // STEP 1: session/create
  log("", "info");
  log("========================================", "step");
  log("[프리셋] STEP 1: POST /session/create", "step");
  log("========================================", "step");
  const t0 = Date.now();
  const waitSub = document.getElementById("pWaitUrlContains").value.trim();
  const createBody = { url: createUrl, timeout };
  if (waitSub) createBody.waitUntilUrlContains = waitSub;
  const createRes = await nodePost("/session/create", createBody);
  logResponse("[응답] STEP 1 POST /session/create", createRes, 8000);
  if (createRes.error) throw new Error(createRes.error);
  const sessionId = createRes.sessionId;
  log("sessionId: " + sessionId, "data");
  if (createRes.finalUrl) log("finalUrl: " + createRes.finalUrl, "data");
  log("Elapsed: " + (Date.now() - t0) + "ms", "data");

  // STEP 2: VM 보안 스크립트 로드
  if (vmBaseUrl) {
    log("", "info");
    log("========================================", "step");
    log("[프리셋] STEP 2: POST /session/evaluate (vmLoadBaseUrl)", "step");
    log("========================================", "step");
    const t1 = Date.now();
    const vmRes = await nodePost("/session/evaluate", {
      sessionId,
      vmLoadBaseUrl: vmBaseUrl,
      timeout
    });
    logResponse("[응답] STEP 2 POST /session/evaluate (vmLoadBaseUrl)", vmRes, 8000);
    if (vmRes.error) throw new Error(vmRes.error);
    log("Script size: " + (vmRes.result && vmRes.result.len) + " bytes", "info");
    log("Elapsed: " + (Date.now() - t1) + "ms", "data");
  } else {
    log("", "info");
    log("========================================", "step");
    log("[프리셋] STEP 2: SKIP (vmLoadBaseUrl 비어있음)", "step");
    log("========================================", "step");
  }

  // STEP 3: XHR
  if (xhrTargetUrl) {
    log("", "info");
    log("========================================", "step");
    log("[프리셋] STEP 3: POST /session/evaluate (targetUrl + payload)", "step");
    log("========================================", "step");
    const t2 = Date.now();
    const evalBody = {
      sessionId,
      targetUrl: xhrTargetUrl,
      contentType: ct || "application/json",
      payload: requestPayload,
      timeout,
    };
    if (document.getElementById("pXhrDelegate").checked) {
      evalBody.xhrDelegateToClient = true;
      evalBody.xhrCaptureTimeoutMs = timeout;
    }
    const ajaxRes = await nodePost("/session/evaluate", evalBody);
    logResponse("[응답] STEP 3 POST /session/evaluate (targetUrl + payload)", ajaxRes, 20000);
    if (ajaxRes.error) throw new Error(ajaxRes.error);
    const r3 = ajaxRes.result;
    if (r3 && r3.delivery === "client" && r3.preparedRequest) {
      log("delegate: preparedRequest.postData 길이 = " + (r3.preparedRequest.postData || "").length, "info");
    } else {
      log("XHR status(페이지 내): " + (r3 && r3.status != null ? r3.status : "N/A"), "info");
    }
    log("Elapsed: " + (Date.now() - t2) + "ms", "data");
    resultEl.textContent = JSON.stringify(ajaxRes.result, null, 2);
  } else {
    log("", "info");
    log("========================================", "step");
    log("[프리셋] STEP 3: SKIP (targetUrl 비어있음)", "step");
    log("========================================", "step");
  }

  // STEP 4: cookies
  log("", "info");
  log("========================================", "step");
  log("[프리셋] STEP 4: POST /session/cookies", "step");
  log("========================================", "step");
  const cRes = await nodePost("/session/cookies", { sessionId });
  logResponse("[응답] STEP 4 POST /session/cookies", cRes, 12000);
  if (cRes.cookies) {
    log("Cookies: " + cRes.cookies.length, "info");
    cRes.cookies.forEach(c => log("  " + c.name + " = " + c.value.substring(0, 40) + "...", "data"));
  }

  // STEP 5: destroy
  log("", "info");
  log("========================================", "step");
  log("[프리셋] STEP 5: POST /session/destroy", "step");
  log("========================================", "step");
  const dRes = await nodePost("/session/destroy", { sessionId });
  logResponse("[응답] STEP 5 POST /session/destroy", dRes, 4000);
  log("Session destroyed.", "info");
  log("========================================", "step");
  log("[프리셋] 전체 완료", "step");
  log("========================================", "step");
}

/* ─── Run Full Process ─── */
document.getElementById("btnRun").onclick = async () => {
  logEl.textContent = "";
  resultEl.textContent = "";
  try {
    await ensureBrowserModeForRun();
    await runPreset();
  } catch (e) {
    log("ERROR: " + (e.message || e), "err");
  }
};

syncBrowserModeFromServer();
