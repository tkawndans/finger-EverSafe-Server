worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream eversafe_cluster {
        least_conn;

        server 172.19.0.3;   # eversafe_1
        server 172.19.0.4;   # eversafe_2
        server 172.19.0.5;   # eversafe_3
        server 172.19.0.6;   # eversafe_4
        server 172.19.0.7;   # eversafe_5

        keepalive 32;
    }

    server {
        listen 8000;

        # 타임아웃 설정 (PDF 파싱 작업 특성상 넉넉하게)
        proxy_connect_timeout   10s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;

        # 업로드 파일 크기 제한 (필요시 조정)
        client_max_body_size    50m;

        location / {
            proxy_pass http://eversafe_cluster;

            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}