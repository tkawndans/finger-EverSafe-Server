worker_processes auto;
events {
    worker_connections 1024;
}
http {
    upstream eversafe_cluster {
        least_conn;
        server 172.19.0.3:3000;   # eversafe_1
        server 172.19.0.4:3000;   # eversafe_2
        server 172.19.0.5:3000;   # eversafe_3
        server 172.19.0.6:3000;   # eversafe_4
        server 172.19.0.7:3000;   # eversafe_5
        server 172.19.0.8:3000;   # eversafe_6
        server 172.19.0.9:3000;   # eversafe_7
        server 172.19.0.10:3000;  # eversafe_8
        server 172.19.0.11:3000;  # eversafe_9
        server 172.19.0.12:3000;  # eversafe_10
        server 172.19.0.13:3000;  # eversafe_11
        server 172.19.0.14:3000;  # eversafe_12
        server 172.19.0.15:3000;  # eversafe_13
        server 172.19.0.16:3000;  # eversafe_14
        server 172.19.0.17:3000;  # eversafe_15
        server 172.19.0.18:3000;  # eversafe_16
        server 172.19.0.19:3000;  # eversafe_17
        server 172.19.0.20:3000;  # eversafe_18
        server 172.19.0.21:3000;  # eversafe_19
        server 172.19.0.22:3000;  # eversafe_20
        keepalive 64;
    }
    server {
        listen 3000;
        proxy_connect_timeout   10s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;
        client_max_body_size    50m;
        location / {
            proxy_pass http://eversafe_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}