    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      pdfnet:
        ipv4_address: 172.19.0.2

