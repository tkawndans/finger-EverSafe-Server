x-parser-base: &eversafe-base
  build:
    context: .
    dockerfile: Dockerfile
  image: eversafe:latest
  restart: always
  # 서버에만 두는 .env (Git에 없음) — 변수가 컨테이너 process.env 로 전달됨. 파일 없으면 compose 버전에 따라 오류 날 수 있음 → 서버에 반드시 생성.
  env_file:
    - .env
  environment:
    TZ: Asia/Seoul
    PORT: "3000"
    # 헤드리스 기본 (Docker에서는 창 없음)
    PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    # 테스트 페이지 필요 시 1 로 두고 test/ 폴더가 이미지에 있어야 함 (Dockerfile에 COPY test 있음)
    ENABLE_TEST_PAGE: "0"
  networks:
    pdfnet: {}

services:
  eversafe_1:
    <<: *eversafe-base
    networks:
      pdfnet:
        ipv4_address: 172.19.0.3

  eversafe_2:
    <<: *eversafe-base
    networks:
      pdfnet:
        ipv4_address: 172.19.0.4

  eversafe_3:
    <<: *eversafe-base
    networks:
      pdfnet:
        ipv4_address: 172.19.0.5

  eversafe_4:
    <<: *eversafe-base
    networks:
      pdfnet:
        ipv4_address: 172.19.0.6

  eversafe_5:
    <<: *eversafe-base
    networks:
      pdfnet:
        ipv4_address: 172.19.0.7

  jsproxy:
    image: nginx:latest
    container_name: jsproxy
    restart: always
    depends_on:
      - eversafe_1
      - eversafe_2
      - eversafe_3
      - eversafe_4
      - eversafe_5
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      pdfnet:
        ipv4_address: 172.19.0.2

networks:
  pdfnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16
          gateway: 172.19.0.1